            margin-top: 0.25rem;

</head>

        // ========== استيراد Firebase ==========

        // ========== إعدادات Firebase (خاصة بالمشروع) ==========
        const firebaseConfig = {

        // ========== قائمة الأسئلة الافتراضية (30) ==========
        const defaultQuestionsPool = [

            { id: 'q3', text: 'ما مستوى ذكائي الاجتماعي في التعامل مع الآخرين؟', type: 'slider', category: 'الذكاء', labels: ['ضعيف', 'جيد', 'عبقري'] },

            { id: 'q8', text: 'ما هو انطباعك الأول عني عادة؟', type: 'multiple', options: ['مغرور ومتكبر', 'خجول وانطوائي', 'ودود ومنفتح', 'غريب الأطوار'] },

            { id: 'q12', text: 'ما مدى كرمي؟', type: 'slider', category: 'الكرم', labels: ['بخيل', 'كريم أحياناً', 'كريم جداً'] },

            { id: 'q14', text: 'ما هو شعوري الغالب تجاه الآخرين؟', type: 'multiple', options: ['حب', 'غيرة', 'لامبالاة', 'تعاطف'] },
            { id: 'q15', text: 'مدى صبري؟', type: 'slider', category: 'الصبر', labels: ['قليل الصبر', 'صبور', 'صبر أيوب'] },
            { id: 'q16', text: 'كيف أتعامل مع النقد؟', type: 'multiple', options: ['بتقبل', 'بانزعاج', 'بتحليل', 'بالتجاهل'] },
            { id: 'q17', text: 'ما هو مستوى طاقتي؟', type: 'slider', category: 'الطاقة', labels: ['خامل', 'متحرك', 'نشيط جداً'] },
            { id: 'q18', text: 'كيف أظهر في الأزمات؟', type: 'multiple', options: ['هادئ', 'متوتر', 'قائد', 'منهار'] },
            { id: 'q19', text: 'مدى اهتمامي بمظهري؟', type: 'slider', category: 'المظهر', labels: ['مهمل', 'مهتم', 'أنيق جداً'] },
            { id: 'q20', text: 'ما هي لهجتي السائدة؟', type: 'multiple', options: ['جادة', 'مرحة', 'ساخرة', 'رسمية'] },
            { id: 'q21', text: 'كيف أتعامل مع المسؤوليات؟', type: 'slider', category: 'المسؤولية', labels: ['أتهرب', 'أتحمل', 'أبحث عنها'] },
            { id: 'q22', text: 'ما مدى فضولي؟', type: 'slider', category: 'الفضول', labels: ['غير فضولي', 'فضولي', 'فضولي جداً'] },
            { id: 'q23', text: 'كيف أتصرف عندما أخطئ؟', type: 'multiple', options: ['أعتذر', 'أبرر', 'ألوم غيري', 'أتجاهل'] },
            { id: 'q24', text: 'ما هو أسلوبي في الحديث؟', type: 'multiple', options: ['لبق', 'حاد', 'متلعثم', 'مقنع'] },
            { id: 'q25', text: 'مدى حبي للتجديد؟', type: 'slider', category: 'التجديد', labels: ['تقليدي', 'مجدد', 'مغامر'] },
            { id: 'q26', text: 'كيف ينظر الناس لمستوى ذكائي؟', type: 'slider', category: 'الذكاء', labels: ['عادي', 'ذكي', 'عبقري'] },
            { id: 'q27', text: 'ما هي مشاعري تجاه النجاح؟', type: 'multiple', options: ['أفرح', 'أحسد', 'أحتفل', 'لا أكترث'] },
            { id: 'q28', text: 'مدى قدرتي على القيادة؟', type: 'slider', category: 'القيادة', labels: ['تابع', 'قائد أحياناً', 'قائد بالفطرة'] },
            { id: 'q29', text: 'كيف أتعامل مع الخلافات؟', type: 'multiple', options: ['أحاور', 'أصمت', 'أنفعل', 'أترك'] },
            { id: 'q30', text: 'كلمة واحدة تصفني بها؟', type: 'text' }
        ];

        // ========== نصائح التطوير الأساسية ==========
        const selfDevAdvice = {
            confidence: {
                low: [
                    "لاحظ بعض الأصدقاء أن ثقتك بنفسك قد تحتاج لتعزيز. تذكر إنجازاتك السابقة واحتفل بالنجاحات الصغيرة.",
                    "حاول التدرب على الحزم في التعبير عن آرائك دون خوف من النقد."
                ],
                high: [
                    "تتمتع بثقة عالية بالنفس، وهذا رائع! احرص فقط على ألا تتحول هذه الثقة إلى غرور في نظر الآخرين.",
                    "استخدم ثقتك لإلهام ودعم من حولك."
                ]
            },
            integrity: {
                low: [
                    "هناك انطباع بأنك قد لا تكون واضحاً دائماً. الصراحة الممزوجة باللباقة تبني جسور الثقة المستدامة."
                ]
            }
        };

        // ========== دالة استدعاء Gemini (AI) ==========
        async function callGemini(prompt) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === 'AIzaSy...') {
                console.warn('Gemini API key غير مضبوط. يرجى إدخال المفتاح الصحيح.');
                return null;
            }
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                console.error('Gemini error:', e);
                return null;
            }
        }

        // ========== utils ==========
        window.utils = {
            generateShareLink: (userId) => `${window.location.origin}/r/${userId}`,
            
            copyToClipboard: (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    window.ui.showToast('تم النسخ', 'تم نسخ الرابط إلى المحفظة، شاركه الآن!');
                });
            },
            
            shareWhatsApp: (text) => {
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            },

            // تحليل الإجابات مع دمج Gemini (اختياري)
            analyzeResults: async (questions, responses) => {
                if (!responses || responses.length === 0) return null;

                const analysis = {
                    totalResponses: responses.length,
                    sliderAverages: {},
                    multipleCharts: {},
                    messages: [],
                    advice: []
                };

                const questionsMap = {};
                questions.forEach(q => questionsMap[q.id] = q);
                const categoryScores = {};

                responses.forEach(resp => {
                    if (resp.anonymousMessage?.trim()) {
                        analysis.messages.push({
                            text: resp.anonymousMessage,
                            time: resp.timestamp?.toDate() || new Date()
                        });
                    }

                    for (const [qId, value] of Object.entries(resp.answers || {})) {
                        const question = questionsMap[qId];
                        if (!question) continue;

                        if (question.type === 'slider') {
                            if (!analysis.sliderAverages[qId]) {
                                analysis.sliderAverages[qId] = { text: question.text, total: 0, count: 0, category: question.category };
                            }
                            analysis.sliderAverages[qId].total += parseInt(value);
                            analysis.sliderAverages[qId].count++;
                        } else if (question.type === 'multiple') {
                            if (!analysis.multipleCharts[qId]) {
                                analysis.multipleCharts[qId] = { text: question.text, data: {} };
                                question.options.forEach(opt => analysis.multipleCharts[qId].data[opt] = 0);
                            }
                            if (analysis.multipleCharts[qId].data[value] !== undefined) {
                                analysis.multipleCharts[qId].data[value]++;
                            }
                        }
                    }
                });

                for (const qId in analysis.sliderAverages) {
                    const item = analysis.sliderAverages[qId];
                    item.avg = Math.round(item.total / item.count);
                    
                    if (item.category) {
                        if (!categoryScores[item.category]) categoryScores[item.category] = { total: 0, count: 0 };
                        categoryScores[item.category].total += item.avg;
                        categoryScores[item.category].count++;
                    }
                }

                // نصائح محلية أولية
                if (categoryScores['التبادل']) {
                    const avg = categoryScores['التبادل'].total / categoryScores['التبادل'].count;
                    if (avg < 50) analysis.advice.push(...selfDevAdvice.confidence.low);
                    else if (avg > 80) analysis.advice.push(...selfDevAdvice.confidence.high);
                }

                // إذا كان مفتاح Gemini موجوداً، نحصل على نصائح أكثر تخصيصاً
                if (GEMINI_API_KEY && GEMINI_API_KEY !== 'AIzaSy...') {
                    // بناء prompt مناسب
                    const prompt = `بناءً على التحليل التالي لشخصية المستخدم من آراء أصدقائه:
                    - عدد الإجابات: ${analysis.totalResponses}
                    - متوسطات الصفات: ${JSON.stringify(analysis.sliderAverages, null, 2)}
                    - توزيع الاختيارات: ${JSON.stringify(analysis.multipleCharts, null, 2)}
                    - الرسائل المجهولة: ${analysis.messages.map(m => m.text).join('; ')}
                    
                    قدم قائمة من 3 إلى 5 نصائح تطويرية مخصصة باللغة العربية الفصحى، مع التركيز على نقاط القوة والضعف.`;
                    
                    const geminiAdvice = await callGemini(prompt);
                    if (geminiAdvice) {
                        // إضافة النصائح من Gemini (يمكن تنسيقها)
                        analysis.advice = analysis.advice.concat(geminiAdvice.split('\n').filter(line => line.trim()));
                    }
                }

                if (analysis.advice.length === 0) {
                    analysis.advice.push("استمر في تطوير ذاتك والاستماع لآراء أصدقائك بقلب مفتوح.");
                }

                return analysis;
            },

            formatDate: (date) => {
                return date.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        };

        window.ui = {

            renderHome: () => {
                contentDiv.innerHTML = `
                    <div class="text-center py-5 page-fade-in">
                        <i class="fas fa-eye fa-5x text-primary mb-4"></i>
                        <h1 class="display-4 fw-bold">ماذا يرى الناس فيك؟</h1>
                        <p class="lead text-muted mb-5">اكتشف الانطباع الحقيقي الذي تتركه لدى أصدقائك وعائلتك. صراحة تامة، سرية مطلقة، وتحليل دقيق لشخصيتك.</p>
                        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                            <button class="btn btn-primary btn-lg px-5" onclick="window.router.navigate('/register')">ابدأ الآن - مجاناً</button>
                            <button class="btn btn-outline-secondary btn-lg px-5" onclick="window.router.navigate('/login')">تسجيل الدخول</button>

                try {
                    const responsesRef = collection(db, "responses");
                    const q = query(responsesRef, where("userId", "==", userId), orderBy("timestamp", "desc"));
                    const querySnapshot = await getDocs(q);
                    const responses = [];
                    querySnapshot.forEach((doc) => responses.push(doc.data()));
                    return responses;
                } catch (error) {
                    console.warn("Error getting responses with orderBy, trying without:", error);
                    try {
                        const qBasic = query(collection(db, "responses"), where("userId", "==", userId));
                        const querySnapshotBasic = await getDocs(qBasic);
                        const responsesBasic = [];
                        querySnapshotBasic.forEach((doc) => responsesBasic.push(doc.data()));

                window.ui.showLoader();

                if (path === '/' || path === '/index.html') {
                    window.ui.renderHome();

                    if (window.auth.isAuthenticated()) { window.router.navigate('/share'); return; }

                } else if (path === '/login') {
                    if (window.auth.isAuthenticated()) { window.router.navigate('/share'); return; }
                    window.ui.renderLogin();

                    if (!window.auth.isAuthenticated()) { window.router.navigate('/login'); return; }
                    const user = window.auth.getCurrentUser();
                    const userData = await window.dbOps.getUserPublicData(user.uid);
                    window.ui.renderCreate(userData?.questions || []);
                } else if (path === '/share') {
                    if (!window.auth.isAuthenticated()) { window.router.navigate('/login'); return; }
                    const user = window.auth.getCurrentUser();
                    window.ui.renderShare(user.uid);
                } else if (path === '/results') {
                    if (!window.auth.isAuthenticated()) { window.router.navigate('/login'); return; }
                    const user = window.auth.getCurrentUser();
                    const userData = await window.dbOps.getUserPublicData(user.uid);
                    const responses = await window.dbOps.getUserResponses(user.uid);
                    // تحليل النتائج باستخدام Gemini إذا توفر المفتاح
                    const analysis = await window.utils.analyzeResults(userData?.questions || [], responses);
                    window.ui.renderResults(analysis);
                } else if (path.startsWith('/r/')) {
                    const targetUserId = path.substring(3);
                    if (!targetUserId) { window.ui.render404(); window.ui.hideLoader(); return; }
                    const ownerData = await window.dbOps.getUserPublicData(targetUserId);
                    if (!ownerData) {
                        contentDiv.innerHTML = `<div class="alert alert-danger text-center">عذراً، هذا الرابط غير صحيح أو تم حذف الحساب.</div>`;
                    } else {
                        window.ui.renderSurvey(ownerData.displayName, ownerData.questions);
                    }
                } else {
                    window.ui.render404();
                }

                window.ui.hideLoader();
            },

            navigate: (path) => {
                window.history.pushState({}, "", path);
                window.router.handleRoute();
            }
        };

        // ========== Event Listeners (بعد تحميل الصفحة) ==========
        document.addEventListener('DOMContentLoaded', () => {
            window.router.handleRoute();

            // ربط زر الخروج
            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                window.auth.logout();
            });

            // رابط العلامة التجارية
            document.getElementById('brand-link').addEventListener('click', (e) => {
                e.preventDefault();
                window.router.navigate('/');
            });

            // الاستماع لتغييرات history (الرجوع)
            window.addEventListener('popstate', window.router.handleRoute);

            // تفويض الأحداث للنماذج والأزرار داخل المحتوى الديناميكي
            document.addEventListener('submit', async (e) => {
                if (e.target.id === 'register-form') {
                    e.preventDefault();
                    const displayName = document.getElementById('reg-display-name').value;
                    const username = document.getElementById('reg-username').value;
                    const password = document.getElementById('reg-password').value;
                    if (password.length < 4) {
                        window.ui.showToast('خطأ', 'كلمة المرور يجب أن تكون 4 أحرف على الأقل.', 'danger');
                        return;
                    }
                    await window.auth.register(username, password, displayName);
                }

                if (e.target.id === 'login-form') {
                    e.preventDefault();
                    const username = document.getElementById('login-username').value;
                    const password = document.getElementById('login-password').value;
                    await window.auth.login(username, password);
                }

                if (e.target.id === 'survey-form') {
                    e.preventDefault();
                    const path = window.location.pathname;
                    const targetUserId = path.substring(3);

                    const answersObj = {};
                    const surveyInputs = document.querySelectorAll('.survey-input');
                    let allAnswered = true;

                    surveyInputs.forEach(input => {
                        if (input.type === 'radio') {
                            if (input.checked) {
                                answersObj[input.name] = input.value;
                            }
                        } else {
                            if (input.value.trim()) {
                                answersObj[input.name] = input.value;
                            } else if (input.hasAttribute('required')) {
                                allAnswered = false;
                            }
                        }
                    });

                    const radioNames = new Set(Array.from(document.querySelectorAll('input[type="radio"].survey-input')).map(r => r.name));
                    for (let name of radioNames) {
                        if (!answersObj[name]) allAnswered = false;
                    }

                    if (!allAnswered) {
                        window.ui.showToast('تنبيه', 'يرجى الإجابة على جميع أسئلة الاختيار المتعدد.', 'warning');
                        return;
                    }

                    const anonymousMessage = document.getElementById('anonymous-message').value;
                    const success = await window.dbOps.submitResponse(targetUserId, answersObj, anonymousMessage);
                    if (success) {
                        window.ui.renderThankYou();
                    }
                }
            });

            document.addEventListener('click', async (e) => {
                if (e.target.id === 'save-questions-btn' || e.target.closest('#save-questions-btn')) {
                    if (!window.auth.isAuthenticated()) return;
                    
                    const selectedQuestionIds = Array.from(document.querySelectorAll('.question-switcher:checked')).map(cb => cb.value);
                    if (selectedQuestionIds.length === 0) {
                        window.ui.showToast('تنبيه', 'برجاء اختيار سؤال واحد على الأقل.', 'warning');
                        return;
                    }

                    const selectedQuestions = defaultQuestionsPool.filter(q => selectedQuestionIds.includes(q.id));
                    const user = window.auth.getCurrentUser();
                    const success = await window.dbOps.saveUserQuestions(user.uid, selectedQuestions);
                    if (success) {
                        window.router.navigate('/share');
                    }
                }
            });
        });
    </script>
